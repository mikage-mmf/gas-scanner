<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>QRコードスキャナー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    button { font-family: inherit; }

    body {
      font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #0d1117;
      color: #ffffff;
      margin: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #8b949e;
      margin: 0;
      letter-spacing: 0.05em;
    }

    /* カメラ枠 */
    .scanner-container {
      position: relative;
      width: min(90vw, 420px);
      aspect-ratio: 3 / 4;
      border-radius: 16px;
      overflow: hidden;
      background-color: #000;
      box-shadow: 0 0 0 3px #30363d, 0 12px 40px rgba(0,0,0,0.6);
      transition: box-shadow 0.15s ease;
    }

    /* スキャン成功フラッシュ */
    .scanner-container.success-flash {
      box-shadow: 0 0 0 4px #2ea043, 0 0 40px 10px rgba(46, 160, 67, 0.7);
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* スキャン成功オーバーレイ */
    .success-overlay {
      position: absolute;
      inset: 0;
      background: rgba(46, 160, 67, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.1s ease;
      pointer-events: none;
      z-index: 10;
    }
    .success-overlay.visible {
      opacity: 1;
    }
    .success-overlay-icon {
      font-size: 5rem;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    }

    /* ガイド枠（中央のスキャンターゲット） */
    .scan-guide {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 55%;
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 5;
    }
    /* 四隅の角線 */
    .scan-guide::before,
    .scan-guide::after,
    .scan-guide span::before,
    .scan-guide span::after {
      content: '';
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: rgba(255,255,255,0.85);
      border-style: solid;
    }
    .scan-guide::before   { top: 0; left: 0;  border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .scan-guide::after    { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .scan-guide span::before { bottom: 0; left: 0;  border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .scan-guide span::after  { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

    /* スキャンライン */
    .scan-line {
      position: absolute;
      left: 5%;
      width: 90%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #58a6ff, transparent);
      top: 0;
      animation: scan 2.4s ease-in-out infinite;
      z-index: 6;
      pointer-events: none;
    }
    .scanner-container.cooldown .scan-line {
      animation: none;
      display: none;
    }
    @keyframes scan {
      0%   { top: 5%; opacity: 0.8; }
      50%  { top: 90%; opacity: 1; }
      100% { top: 5%; opacity: 0.8; }
    }

    /* ステータスメッセージエリア */
    #status-area {
      width: min(90vw, 420px);
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 1.05rem;
      font-weight: 700;
      text-align: center;
      background: #161b22;
      border: 1px solid #30363d;
      min-height: 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    #status-area.ready    { color: #8b949e; }
    #status-area.success  { color: #2ea043; background: #0d1f12; border-color: #2ea043; font-size: 1.3rem; }
    #status-area.error    { color: #f85149; background: #1f0d0d; border-color: #f85149; }
    #status-area.info     { color: #58a6ff; background: #0d1b2a; border-color: #1f6feb; font-weight: 400; font-size: 0.95rem; }

    /* カメラ切り替えボタン */
    #switch-btn {
      width: min(90vw, 420px);
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 10px 24px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    #switch-btn:hover { background: #30363d; }
    #switch-btn:active { background: #3d444d; }

    /* スキャン成功オーバーレイ内のコンテンツ配置 */
    .success-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 0 16px;
    }
    /* 事業所名の表示スタイル（ふわっと表示） */
    .overlay-service-name {
      font-size: 1.3rem;
      font-weight: 700;
      color: #ffffff;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      word-break: break-all;
    }
    .overlay-service-name.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <h1>📷 QRコードスキャナー</h1>

  <div class="scanner-container" id="scanner-container">
    <video id="video-preview" autoplay playsinline muted></video>
    <div class="scan-guide"><span></span></div>
    <div class="scan-line" id="scan-line"></div>
    <div class="success-overlay" id="success-overlay">
      <div class="success-content">
        <span class="success-overlay-icon">✅</span>
        <div id="overlay-service-name" class="overlay-service-name"></div>
      </div>
    </div>
  </div>

  <div id="status-area" class="ready"></div>

  <button id="switch-btn">🔄 カメラ切り替え</button>

  <script>
    // ─────────────────────────────────────────
    // ★★★ 設定エリア ★★★
    // GASウェブアプリの「デプロイURL」のみここに設定します。
    // 認証キーはGASアプリ側から自動的にURLパラメータで渡されます。
    // ─────────────────────────────────────────
    const GAS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbxaFVTJpWBk1zBXmRvgFze_fcnehjnJaXi9DfCEby_8wI2LfLUNHfRx5PZOP_4q0-DF/exec';
    // ─────────────────────────────────────────

    const video          = document.getElementById('video-preview');
    const statusArea     = document.getElementById('status-area');
    const container      = document.getElementById('scanner-container');
    const successOverlay = document.getElementById('success-overlay');

    const ScannerTranslations = {
      ja: {
        title: "📷 QRコードスキャナー",
        loading: "カメラ起動中…",
        scanMessage: "QRコードをかざしてください",
        successMessage: "✅ 受付完了！",
        switchBtn: "🔄 カメラ切り替え",
        retryBtn: "🔄 再試行",
        unsupportedBrowser: "❌ お使いのブラウザはカメラ機能をサポートしていないか、安全な接続（HTTPS）ではありません。",
        failedInCamera: "インカメラ",
        failedOutCamera: "背面カメラ",
        failedSpecifiedCamera: "指定されたカメラ",
        otherAppRunning: "ℹ️ 「{failedLabel}」は別のアプリが使用中か、起動できません。\n{count}秒後に「{nextLabel}」へ切り替えます...",
        allCameraFailed: "❌ すべてのカメラの起動に失敗しました。\n「{failedLabel}」が他のアプリで起動中か、接続に問題があります。",
        cameraInitFailed: "❌ カメラ「{failedLabel}」の起動に失敗しました。\n権限設定を確認してください。"
      },
      en: {
        title: "📷 QR Code Scanner",
        loading: "Starting camera...",
        scanMessage: "Please scan the QR code",
        successMessage: "✅ Checked in!",
        switchBtn: "🔄 Switch Camera",
        retryBtn: "🔄 Retry",
        unsupportedBrowser: "❌ Your browser does not support camera functions or it is not a secure connection (HTTPS).",
        failedInCamera: "Front Camera",
        failedOutCamera: "Rear Camera",
        failedSpecifiedCamera: "Specified Camera",
        otherAppRunning: "ℹ️ \"{failedLabel}\" is in use by another app or cannot start.\nSwitching to \"{nextLabel}\" in {count}s...",
        allCameraFailed: "❌ Failed to start all cameras.\n\"{failedLabel}\" might be in use by another app or has connection issues.",
        cameraInitFailed: "❌ Failed to start camera \"{failedLabel}\"\nPlease check permission settings."
      },
      es: {
        title: "📷 Escáner de Código QR",
        loading: "Iniciando cámara...",
        scanMessage: "Por favor, escanee el código QR",
        successMessage: "✅ ¡Registrado!",
        switchBtn: "🔄 Cambiar Cámara",
        retryBtn: "🔄 Reintentar",
        unsupportedBrowser: "❌ Su navegador no admite funciones de cámara o no es una conexión segura (HTTPS).",
        failedInCamera: "Cámara frontal",
        failedOutCamera: "Cámara trasera",
        failedSpecifiedCamera: "Cámara especificada",
        otherAppRunning: "ℹ️ \"{failedLabel}\" está en uso por otra aplicación o no se puede iniciar.\nCambiando a \"{nextLabel}\" en {count}s...",
        allCameraFailed: "❌ No se pudieron iniciar todas las cámaras.\n\"{failedLabel}\" podría estar en uso por otra aplicación o tener problemas de conexión.",
        cameraInitFailed: "❌ No se pudo iniciar la cámara \"{failedLabel}\"\nPor favor, verifique la configuración de permisos."
      },
      zh: {
        title: "📷 二维码扫描仪",
        loading: "正在启动摄像头...",
        scanMessage: "请对准二维码进行扫描",
        successMessage: "✅ 签到成功！",
        switchBtn: "🔄 切换摄像头",
        retryBtn: "🔄 重试",
        unsupportedBrowser: "❌ 您的浏览器不支持摄像头功能或不是安全连接（HTTPS）。",
        failedInCamera: "前置摄像头",
        failedOutCamera: "后置摄像头",
        failedSpecifiedCamera: "指定的摄像头",
        otherAppRunning: "ℹ️ \"{failedLabel}\" 正在被其他应用使用或无法启动。\n将在 {count} 秒后切换到 \"{nextLabel}\"...",
        allCameraFailed: "❌ 无法启动所有摄像头。\n\"{failedLabel}\" 可能正被其他应用使用，或存在连接问题。",
        cameraInitFailed: "❌ 无法启动摄像头 \"{failedLabel}\"\n请检查权限设置。"
      }
    };

    // URLパラメータからカメラの向き（デフォルト: 背面）、当日キー、言語を取得
    const urlParams  = new URLSearchParams(window.location.search);
    let facingMode   = urlParams.get('mode') || 'environment';
    const dailyKey   = urlParams.get('key') || '';  // GASアプリから渡される当日限定キー
    const lang       = urlParams.get('lang') || 'ja';
    const dict       = ScannerTranslations[lang] || ScannerTranslations.ja;

    // 初期表示と言語の適用
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelector('h1').textContent = dict.title;
      document.title = dict.title.replace('📷 ', '');
      const switchBtn = document.getElementById('switch-btn');
      if (switchBtn) switchBtn.textContent = dict.switchBtn;
      const statusArea = document.getElementById('status-area');
      if (statusArea) statusArea.textContent = dict.loading;
    });
    let scanning     = false;
    let cooldown     = false;
    let currentStream = null;


    // ─────────────────────────────────────────
    // 「ピッ」音の生成（Web Audio API）
    // ─────────────────────────────────────────
    function playBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = ctx.createOscillator();
        const gainNode   = ctx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(ctx.destination);
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(1046, ctx.currentTime); // ド（高め）
        gainNode.gain.setValueAtTime(0.6, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + 0.3);
      } catch(e) {
        console.warn('Beep failed:', e);
      }
    }

    // 利用可能なカメラデバイスのリストと現在のインデックス
    let videoDevices = [];
    let currentDeviceIndex = 0;
    let attemptCycleDevices = new Set();
    let switchTimer = null;

    // カメラ起動（deviceId指定があればそのデバイス、なければfacingModeで起動）
    function startCamera(deviceIdOrMode, isManual = false) {
      console.log(`[Camera] startCamera() 呼び出し。引数: "${deviceIdOrMode}", isManual: ${isManual}`);
      console.log(`[Camera] 現在のvideoDevices一覧:`, videoDevices.map((d, i) => `[${i}] ${d.label} (${d.deviceId.substring(0,8)}…)`));
      console.log(`[Camera] currentDeviceIndex: ${currentDeviceIndex}`);

      // 進行中の切り替えタイマーがあればキャンセル
      if (switchTimer) {
        console.log('[Camera] 進行中の自動切り替えタイマーをクリアします。');
        clearInterval(switchTimer);
        switchTimer = null;
      }

      if (isManual) {
        attemptCycleDevices.clear();
      }

      if (currentStream) {
        console.log('[Camera] 既存ストリームを停止中…');
        currentStream.getTracks().forEach(t => {
          console.log(`[Camera]  → track停止: ${t.label} (state: ${t.readyState})`);
          t.stop();
        });
        currentStream = null;
      }
      scanning = false;
      setStatus('ready', dict.loading);

      // ブラウザ互換性チェック
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus('error', dict.unsupportedBrowser);
        return;
      }

      // 'environment'/'user' ならfacingMode、それ以外はdeviceId として扱う
      const isFacingMode = (!deviceIdOrMode || deviceIdOrMode === 'environment' || deviceIdOrMode === 'user');
      const constraint = isFacingMode
        ? { video: { facingMode: deviceIdOrMode || 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } }
        : { video: { deviceId: { exact: deviceIdOrMode }, width: { ideal: 1280 }, height: { ideal: 720 } } };

      console.log('[Camera] 使用するconstraint:', JSON.stringify(constraint));

      // カメラハードウェアが解放されるまで少し待ってから起動
      setTimeout(() => {
        console.log('[Camera] getUserMedia() 開始…');
        navigator.mediaDevices.getUserMedia(constraint)
        .then(stream => {
          currentStream = stream;
          const track = stream.getVideoTracks()[0];
          const activeId = track?.getSettings()?.deviceId;
          console.log(`[Camera] ✅ 起動成功: "${track?.label}", deviceId: ${activeId?.substring(0,12)}…`);
          video.srcObject = stream;
          video.play();
          scanning = true;

          // 正常起動したので失敗サイクルをクリア
          attemptCycleDevices.clear();

          // 起動成功後に利用可能なデバイス一覧を更新
          navigator.mediaDevices.enumerateDevices().then(devices => {
            videoDevices = devices.filter(d => d.kind === 'videoinput');
            console.log('[Camera] 利用可能なカメラ一覧:', videoDevices.map((d, i) => `[${i}] ${d.label}`));
            const btn = document.getElementById('switch-btn');
            if (btn) btn.style.display = videoDevices.length <= 1 ? 'none' : '';
            if (activeId) {
              const idx = videoDevices.findIndex(d => d.deviceId === activeId);
              if (idx !== -1) currentDeviceIndex = idx;
            }
            console.log(`[Camera] activeDeviceIndex: ${currentDeviceIndex}`);
          });
          setStatus('ready', dict.scanMessage);
          requestAnimationFrame(tick);
        })
        .catch(async err => {
          console.error(`[Camera] ❌ エラー: ${err.name} - ${err.message}`);
          if (err.constraint) console.error('[Camera] 違反したconstraint:', err.constraint);

          // エラー時でも最新のデバイス一覧取得を試みる
          try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            videoDevices = devices.filter(d => d.kind === 'videoinput');
            const btn = document.getElementById('switch-btn');
            if (btn) btn.style.display = videoDevices.length <= 1 ? 'none' : '';
          } catch (e) {
            console.error('[Camera] デバイス一覧の更新失敗:', e);
          }

          // 現在試みて失敗したカメラの名前・IDを特定
          let failedLabel = 'カメラ';
          let failedDeviceId = null;
          if (videoDevices.length > 0 && currentDeviceIndex < videoDevices.length) {
            failedLabel = videoDevices[currentDeviceIndex].label || `カメラ #${currentDeviceIndex + 1}`;
            failedDeviceId = videoDevices[currentDeviceIndex].deviceId;
          } else {
            failedLabel = isFacingMode ? (deviceIdOrMode === 'user' ? dict.failedInCamera : dict.failedOutCamera) : dict.failedSpecifiedCamera;
          }

          // 失敗したカメラを記録
          if (failedDeviceId) {
            attemptCycleDevices.add(failedDeviceId);
          } else {
            attemptCycleDevices.add(deviceIdOrMode);
          }

          if (err.name === 'NotReadableError') {
            // 他のカメラが利用可能かチェック
            const nextIndex = (currentDeviceIndex + 1) % videoDevices.length;
            const nextDevice = videoDevices[nextIndex];
            
            // 次のカメラも既に失敗している、または他にカメラがない場合（無限ループ防止）
            if (videoDevices.length <= 1 || (nextDevice && attemptCycleDevices.has(nextDevice.deviceId))) {
              console.warn('[Camera] すべてのカメラが失敗したか、切り替え先がありません。自動切り替えを停止します。');
              const retryBtnHtml = `<div style="margin-top: 8px;"><button onclick="retryCamera()" style="background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 6px 16px; font-size: 0.85rem; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 4px;">${dict.retryBtn}</button></div>`;
              setStatus('error', dict.allCameraFailed.replace('{failedLabel}', failedLabel), retryBtnHtml);
            } else {
              // カウントダウン付きで次のデバイスへ自動スキップ
              const nextLabel = nextDevice.label || `カメラ #${nextIndex + 1}`;
              let count = 3;
              setStatus('info', dict.otherAppRunning.replace('{failedLabel}', failedLabel).replace('{count}', count).replace('{nextLabel}', nextLabel));
              
              switchTimer = setInterval(() => {
                count--;
                if (count > 0) {
                  setStatus('info', dict.otherAppRunning.replace('{failedLabel}', failedLabel).replace('{count}', count).replace('{nextLabel}', nextLabel));
                } else {
                  clearInterval(switchTimer);
                  switchTimer = null;
                  currentDeviceIndex = nextIndex;
                  console.log(`[Camera] カウントダウン完了: デバイス[${nextIndex}] (${nextLabel}) へスキップ`);
                  startCamera(nextDevice.deviceId);
                }
              }, 1000);
            }
          } else {
            // 権限エラーやその他のエラー
            const retryBtnHtml = `<div style="margin-top: 8px;"><button onclick="retryCamera()" style="background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 6px 16px; font-size: 0.85rem; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 4px;">${dict.retryBtn}</button></div>`;
            setStatus('error', dict.cameraInitFailed.replace('{failedLabel}', failedLabel), retryBtnHtml);
          }
        });
      }, 300);
    }

    // カメラ起動の再試行用（グローバルスコープに配置）
    function retryCamera() {
      console.log('[Camera] 再試行ボタンが押されました。履歴をクリアして再起動します。');
      const targetId = (videoDevices.length > 0 && videoDevices[currentDeviceIndex])
        ? videoDevices[currentDeviceIndex].deviceId
        : facingMode;
      startCamera(targetId, true);
    }
    window.retryCamera = retryCamera;


    // ─────────────────────────────────────────
    // ステータス表示ヘルパー
    // ─────────────────────────────────────────
    function setStatus(type, message, htmlContent = '') {
      statusArea.className = type;
      statusArea.innerHTML = message.replace(/\n/g, '<br>') + htmlContent;
    }

    // ─────────────────────────────────────────
    // スキャン成功時の演出
    // ─────────────────────────────────────────
    let resetTimer = null;

    function showSuccessFeedback() {
      if (resetTimer) clearTimeout(resetTimer);

      // 枠を緑色に光らせる
      container.classList.add('success-flash');
      // オーバーレイ（チェックマーク）を表示
      successOverlay.classList.add('visible');
      // 事業所名表示をクリア＆非表示にしておく
      const serviceNameEl = document.getElementById('overlay-service-name');
      if (serviceNameEl) {
        serviceNameEl.textContent = '';
        serviceNameEl.classList.remove('visible');
      }
      // ステータスメッセージ
      setStatus('success', dict.successMessage);
    }

    function resetScannerDelay(delayMs) {
      if (resetTimer) clearTimeout(resetTimer);
      resetTimer = setTimeout(() => {
        container.classList.remove('success-flash');
        successOverlay.classList.remove('visible');
        const serviceNameEl = document.getElementById('overlay-service-name');
        if (serviceNameEl) {
          serviceNameEl.textContent = '';
          serviceNameEl.classList.remove('visible');
        }
        cooldown = false;
        scanning = true;
        setStatus('ready', dict.scanMessage);
        requestAnimationFrame(tick);
      }, delayMs);
    }

    // ─────────────────────────────────────────
    // QRコード解析ループ
    // ─────────────────────────────────────────
    const canvas  = document.createElement('canvas');
    const context = canvas.getContext('2d', { willReadFrequently: true });

    function tick() {
      if (!scanning || cooldown) return;

      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);

        if (code && code.data) {
          scanning = false;
          cooldown = true;

          // ① ピッ音を鳴らす
          playBeep();
          // ② 演出を表示（fetch完了を待たずに即時）
          showSuccessFeedback();
          // ③ GAS doPost エンドポイントへ直接送信
          sendToGas(code.data);
          return;
        }
      }
      requestAnimationFrame(tick);
    }

    // ─────────────────────────────────────────
    // GAS doPost へのデータ送信
    // ─────────────────────────────────────────
    function sendToGas(qrCodeId) {
      fetch(GAS_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' }, // GASのfetch制約上、text/plainを使用
        body: JSON.stringify({ apiKey: dailyKey, qrCodeId: qrCodeId })
      })
      .then(res => res.json())
      .then(data => {
        if (!data.success) {
          console.warn('[Scanner] GASエラー:', data.message);
          // エラーの場合は演出を解除してエラー表示にする
          container.classList.remove('success-flash');
          successOverlay.classList.remove('visible');
          setStatus('error', data.message);
          // エラー時は確認しやすいように3秒後にリセット
          resetScannerDelay(3000);
        } else {
          console.log('[Scanner] GAS応答:', data.message);
          // 成功時：事業所名を取得して表示
          const serviceName = data.updatedService ? data.updatedService.name : '';
          if (serviceName) {
            // ステータスエリアを更新（事業所名を追加）
            setStatus('success', `${dict.successMessage}<br><span style="font-size: 0.95rem; font-weight: normal; color: #8b949e;">${serviceName}</span>`);
            
            // オーバーレイ内にも表示
            const serviceNameEl = document.getElementById('overlay-service-name');
            if (serviceNameEl) {
              serviceNameEl.textContent = serviceName;
              serviceNameEl.classList.add('visible');
            }
          }
          // レスポンスが返ってから2秒間表示を維持する
          resetScannerDelay(2000);
        }
      })
      .catch(err => {
        console.error('[Scanner] 送信失敗:', err);
        container.classList.remove('success-flash');
        successOverlay.classList.remove('visible');
        setStatus('error', '通信エラーが発生しました。接続を確認してください。');
        resetScannerDelay(3000);
      });
    }

    // ─────────────────────────────────────────
    // カメラ切り替えボタン（接続されたカメラを順番に循環）
    // ─────────────────────────────────────────
    document.getElementById('switch-btn').addEventListener('click', () => {
      if (videoDevices.length <= 1) return;
      cooldown = false;
      currentDeviceIndex = (currentDeviceIndex + 1) % videoDevices.length;
      startCamera(videoDevices[currentDeviceIndex].deviceId, true);
    });

    // ─────────────────────────────────────────
    // 起動
    // ─────────────────────────────────────────
    startCamera(facingMode);
  </script>
</body>
</html>
